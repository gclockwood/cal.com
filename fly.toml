app = "cal-com-halftide"
primary_region = "ewr"

[build]
  image = "ghcr.io/gclockwood/cal.com:latest"

[deploy]
  release_command = "/bin/sh -c 'npx prisma migrate deploy --schema /calcom/packages/prisma/schema.prisma && npx ts-node --transpile-only /calcom/scripts/seed-app-store.ts'"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NEXT_PUBLIC_WEBAPP_URL = "https://cal.cstl.io"
  SKIP_APP_STORE_SEED = "1"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
